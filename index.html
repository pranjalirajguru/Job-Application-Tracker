<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Tracker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--surface:#18181c;--surface2:#222228;--border:#2e2e38;
  --text:#f0f0f4;--muted:#7a7a8c;
  --applied:#3b82f6;--applied-bg:#1a2740;--applied-glow:rgba(59,130,246,.15);
  --pending:#f59e0b;--pending-bg:#2a2010;--pending-glow:rgba(245,158,11,.15);
  --rejected:#ef4444;--rejected-bg:#2a1212;--rejected-glow:rgba(239,68,68,.15);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
header{padding:18px 26px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;position:sticky;top:0;background:rgba(15,15,17,.96);z-index:100}
.logo{display:flex;align-items:center;gap:9px}
.logo h1{font-weight:800;font-size:1.3rem;letter-spacing:-.02em}
.dpulse{width:9px;height:9px;border-radius:50%;background:var(--applied);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.65)}}
.toolbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.swrap{position:relative}
.swrap input{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.875rem;padding:8px 12px 8px 32px;width:200px;outline:none;font-family:inherit;transition:border-color .2s}
.swrap input:focus{border-color:var(--applied)}
.swrap input::placeholder{color:var(--muted)}
.sico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none}
.btn-add{display:flex;align-items:center;gap:6px;background:var(--applied);color:#fff;border:none;border-radius:8px;padding:8px 15px;font-size:.875rem;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .2s}
.btn-add:hover{background:#2563eb}
.stats-bar{display:flex;gap:9px;padding:12px 26px;border-bottom:1px solid var(--border);overflow-x:auto}
.chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:99px;padding:5px 12px;font-size:.79rem;white-space:nowrap;flex-shrink:0}
.chip .cdot{width:7px;height:7px;border-radius:50%}
.chip b{font-weight:700}
main{padding:22px 26px 60px;max-width:1400px;margin:0 auto}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start}
.col{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.col-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--border)}
.col-title{display:flex;align-items:center;gap:7px;font-weight:700;font-size:.8rem;letter-spacing:.06em;text-transform:uppercase}
.cbadge{width:8px;height:8px;border-radius:50%}
.ccount{font-size:.77rem;font-weight:700;background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:2px 8px;color:var(--muted)}
.col-body{padding:11px;display:flex;flex-direction:column;gap:8px;min-height:60px}
.col[data-col="applied"] .col-hdr{background:var(--applied-bg)}
.col[data-col="applied"] .col-title{color:var(--applied)}
.col[data-col="pending"] .col-hdr{background:var(--pending-bg)}
.col[data-col="pending"] .col-title{color:var(--pending)}
.col[data-col="rejected"] .col-hdr{background:var(--rejected-bg)}
.col[data-col="rejected"] .col-title{color:var(--rejected)}
.empty{text-align:center;padding:22px 10px;color:var(--muted);font-size:.82rem;display:none}
.col-body.mt-empty .empty{display:block}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;transition:transform .2s,box-shadow .2s;animation:cin .2s ease}
@keyframes cin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card:hover{transform:translateY(-2px)}
.card[data-s="applied"]{border-left:3px solid var(--applied)}
.card[data-s="applied"]:hover{box-shadow:0 5px 20px var(--applied-glow)}
.card[data-s="pending"]{border-left:3px solid var(--pending)}
.card[data-s="pending"]:hover{box-shadow:0 5px 20px var(--pending-glow)}
.card[data-s="rejected"]{border-left:3px solid var(--rejected)}
.card[data-s="rejected"]:hover{box-shadow:0 5px 20px var(--rejected-glow)}
.cc{font-weight:700;font-size:.92rem;margin-bottom:2px}
.cr{font-size:.81rem;color:var(--muted);margin-bottom:6px}
.cd{font-size:.75rem;color:var(--muted)}
.cn{font-size:.8rem;color:#a0a0b4;background:rgba(255,255,255,.03);border-radius:5px;padding:5px 8px;margin-top:7px;border-left:2px solid var(--border);line-height:1.4}
.cact{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap;align-items:center}
.mvbtn{font-size:.72rem;font-weight:500;padding:3px 8px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:background .2s,color .2s}
.mvbtn:hover{background:var(--surface);color:var(--text)}
.delbtn{margin-left:auto;background:transparent;border:none;cursor:pointer;color:var(--muted);padding:3px 6px;border-radius:5px;font-size:.95rem;line-height:1;transition:color .2s,background .2s}
.delbtn:hover{color:var(--rejected);background:rgba(239,68,68,.1)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;max-width:450px;transform:translateY(12px) scale(.98);transition:transform .22s}
.overlay.open .modal{transform:translateY(0) scale(1)}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mhdr h2{font-weight:800;font-size:1.1rem}
.xbtn{background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:1rem;line-height:1;transition:color .2s}
.xbtn:hover{color:var(--text)}
.fg{margin-bottom:13px}
label{display:block;font-size:.77rem;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
input[type=text],input[type=date],textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;font-size:.875rem;padding:8px 11px;outline:none;transition:border-color .2s}
input[type=text]:focus,input[type=date]:focus,textarea:focus{border-color:var(--applied)}
textarea{resize:vertical;min-height:68px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.sr{display:none}
.sl{display:flex;align-items:center;justify-content:center;padding:8px 4px;border-radius:6px;border:1px solid var(--border);cursor:pointer;font-size:.77rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);transition:all .2s}
#ra:checked+.sl{background:var(--applied-bg);border-color:var(--applied);color:var(--applied)}
#rp:checked+.sl{background:var(--pending-bg);border-color:var(--pending);color:var(--pending)}
#rr:checked+.sl{background:var(--rejected-bg);border-color:var(--rejected);color:var(--rejected)}
.subbtn{width:100%;background:var(--applied);color:#fff;border:none;border-radius:7px;padding:10px;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;margin-top:5px;transition:background .2s}
.subbtn:hover{background:#2563eb}
#noRes{text-align:center;color:var(--muted);padding:38px;display:none;font-size:.87rem}
@media(max-width:900px){
  header,main,.stats-bar{padding-left:14px;padding-right:14px}
  .board{grid-template-columns:1fr}
}
@media(max-width:480px){
  .btn-lbl{display:none}
  .frow{grid-template-columns:1fr}
  .swrap input{width:140px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="dpulse"></div>
    <h1>Job Tracker</h1>
  </div>
  <div class="toolbar">
    <div class="swrap">
      <span class="sico">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Search jobs...">
    </div>
    <button class="btn-add" onclick="openModal()">+ <span class="btn-lbl">Add Application</span></button>
  </div>
</header>

<div class="stats-bar">
  <div class="chip"><div class="cdot" style="background:var(--muted)"></div>Total <b id="cT">0</b></div>
  <div class="chip"><div class="cdot" style="background:var(--applied)"></div>Applied <b id="cA">0</b></div>
  <div class="chip"><div class="cdot" style="background:var(--pending)"></div>Pending <b id="cP">0</b></div>
  <div class="chip"><div class="cdot" style="background:var(--rejected)"></div>Rejected <b id="cR">0</b></div>
</div>

<main>
  <div id="noRes">No applications match your search.</div>
  <div class="board" id="board">

    <div class="col" data-col="applied">
      <div class="col-hdr">
        <div class="col-title"><div class="cbadge" style="background:var(--applied)"></div>Applied</div>
        <span class="ccount" id="cc-applied">0</span>
      </div>
      <div class="col-body" id="col-applied"><div class="empty">No applications yet</div></div>
    </div>

    <div class="col" data-col="pending">
      <div class="col-hdr">
        <div class="col-title"><div class="cbadge" style="background:var(--pending)"></div>Pending</div>
        <span class="ccount" id="cc-pending">0</span>
      </div>
      <div class="col-body" id="col-pending"><div class="empty">Nothing pending</div></div>
    </div>

    <div class="col" data-col="rejected">
      <div class="col-hdr">
        <div class="col-title"><div class="cbadge" style="background:var(--rejected)"></div>Rejected</div>
        <span class="ccount" id="cc-rejected">0</span>
      </div>
      <div class="col-body" id="col-rejected"><div class="empty">No rejections</div></div>
    </div>

  </div>
</main>

<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <div class="mhdr">
      <h2>New Application</h2>
      <button class="xbtn" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="frow">
      <div class="fg">
        <label for="fCo">Company *</label>
        <input type="text" id="fCo" placeholder="e.g. Google" autocomplete="off">
      </div>
      <div class="fg">
        <label for="fRo">Job Role *</label>
        <input type="text" id="fRo" placeholder="e.g. Developer" autocomplete="off">
      </div>
    </div>
    <div class="fg">
      <label for="fDt">Date Applied *</label>
      <input type="date" id="fDt">
    </div>
    <div class="fg">
      <label>Status *</label>
      <div class="sgrid">
        <input type="radio" name="st" id="ra" class="sr" value="applied" checked>
        <label for="ra" class="sl">&#10003; Applied</label>
        <input type="radio" name="st" id="rp" class="sr" value="pending">
        <label for="rp" class="sl">&#8987; Pending</label>
        <input type="radio" name="st" id="rr" class="sr" value="rejected">
        <label for="rr" class="sl">&#10005; Rejected</label>
      </div>
    </div>
    <div class="fg">
      <label for="fNo">Notes (optional)</label>
      <textarea id="fNo" placeholder="Recruiter name, salary, interview stage..."></textarea>
    </div>
    <button class="subbtn" onclick="addJob()">Add Application</button>
  </div>
</div>

<script>
var jobs=[];
try{jobs=JSON.parse(localStorage.getItem('jat3')||'[]');}catch(e){jobs=[];}
var q='';

function save(){try{localStorage.setItem('jat3',JSON.stringify(jobs));}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(iso){
  if(!iso)return'';
  var p=iso.split('-'),m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[+p[1]-1]+' '+(+p[2])+', '+p[0];
}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

function render(){
  var filtered=q?jobs.filter(function(j){return(j.company+j.role+(j.notes||'')).toLowerCase().indexOf(q)>=0;}):jobs;
  var cnt={applied:0,pending:0,rejected:0};
  jobs.forEach(function(j){cnt[j.status]++;});
  ['applied','pending','rejected'].forEach(function(s){
    var col=document.getElementById('col-'+s);
    Array.from(col.querySelectorAll('.card')).forEach(function(c){c.remove();});
    var sub=filtered.filter(function(j){return j.status===s;});
    col.classList.toggle('mt-empty',sub.length===0);
    sub.forEach(function(job){col.appendChild(mkCard(job));});
    document.getElementById('cc-'+s).textContent=cnt[s];
  });
  document.getElementById('cT').textContent=jobs.length;
  document.getElementById('cA').textContent=cnt.applied;
  document.getElementById('cP').textContent=cnt.pending;
  document.getElementById('cR').textContent=cnt.rejected;
  var nr=document.getElementById('noRes'),bd=document.getElementById('board');
  if(q&&filtered.length===0){nr.style.display='block';bd.style.display='none';}
  else{nr.style.display='none';bd.style.display='';}
}

function mkCard(job){
  var d=document.createElement('div');
  d.className='card';d.dataset.s=job.status;
  var others=['applied','pending','rejected'].filter(function(s){return s!==job.status;});
  var mv=others.map(function(s){return'<button class="mvbtn" onclick="mv(\''+job.id+'\',\''+s+'\')">&#8594; '+cap(s)+'</button>';}).join('');
  d.innerHTML='<div class="cc">'+esc(job.company)+'</div>'+
    '<div class="cr">'+esc(job.role)+'</div>'+
    '<div class="cd">Applied '+fmt(job.date)+'</div>'+
    (job.notes?'<div class="cn">'+esc(job.notes)+'</div>':'')+
    '<div class="cact">'+mv+'<button class="delbtn" onclick="dl(\''+job.id+'\')" title="Delete">&#128465;</button></div>';
  return d;
}

function addJob(){
  var co=document.getElementById('fCo').value.trim();
  var ro=document.getElementById('fRo').value.trim();
  var dt=document.getElementById('fDt').value;
  var no=document.getElementById('fNo').value.trim();
  var st=document.querySelector('input[name="st"]:checked').value;
  var ok=true;
  if(!co){document.getElementById('fCo').style.borderColor='var(--rejected)';ok=false;}
  if(!ro){document.getElementById('fRo').style.borderColor='var(--rejected)';ok=false;}
  if(!dt){document.getElementById('fDt').style.borderColor='var(--rejected)';ok=false;}
  if(!ok)return;
  jobs.unshift({id:uid(),company:co,role:ro,date:dt,notes:no,status:st});
  save();render();closeModal();
}

function dl(id){jobs=jobs.filter(function(j){return j.id!==id;});save();render();}
function mv(id,s){var j=jobs.find(function(j){return j.id===id;});if(j){j.status=s;save();render();}}

function openModal(){
  document.getElementById('overlay').classList.add('open');
  document.getElementById('fDt').value=new Date().toISOString().split('T')[0];
  setTimeout(function(){document.getElementById('fCo').focus();},50);
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  ['fCo','fRo','fNo'].forEach(function(id){var el=document.getElementById(id);el.value='';el.style.borderColor='';});
  document.getElementById('fDt').value='';
  document.getElementById('fDt').style.borderColor='';
  document.querySelector('input[name="st"][value="applied"]').checked=true;
}
function bgClose(e){if(e.target===document.getElementById('overlay'))closeModal();}

document.getElementById('searchInput').addEventListener('input',function(){q=this.value.toLowerCase();render();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
['fCo','fRo','fDt'].forEach(function(id){document.getElementById(id).addEventListener('input',function(){this.style.borderColor='';});});

render();
</script>
</body>
</html>
